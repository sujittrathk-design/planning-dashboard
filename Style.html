<style>
  /* ==========================================
     Style.html - Modern Design System
     Data Planning System
     ========================================== */
  @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
  :root {
    /* ── Brand Palette ───────────────────── */
    --primary:       #2563eb;
    --primary-hover: #1d4ed8;
    --primary-light: #dbeafe;
    --primary-muted: #eff6ff;
    --accent:        #f59e0b;
    --accent-hover:  #d97706;
    --accent-light:  #fef3c7;
    --success:       #10b981;
    --success-hover: #059669;
    --success-light: #d1fae5;
    --danger:        #ef4444;
    --danger-hover:  #dc2626;
    --danger-light:  #fee2e2;
    --warning:       #f59e0b;
    --warning-hover: #d97706;
    --warning-light: #fef3c7;
    --info:          #3b82f6;
    --info-hover:    #2563eb;
    --info-light:    #dbeafe;

    /* ── Neutral Palette ───────────────────── */
    --gray-900: #111827;
    --gray-800: #1f2937;
    --gray-700: #374151;
    --gray-600: #4b5563;
    --gray-500: #6b7280;
    --gray-400: #9ca3af;
    --gray-300: #d1d5db;
    --gray-200: #e5e7eb;
    --gray-100: #f3f4f6;
    --white:    #ffffff;

    /* ── Typography ────────────────────────── */
    --font-sans:   'Sarabun', sans-serif;
    --font-display: 'Plus Jakarta Sans', sans-serif;

    /* ── Spacing ───────────────────────────── */
    --spacing-xs: 4px;
    --spacing-sm: 8px;
    --spacing-md: 16px;
    --spacing-lg: 24px;
    --spacing-xl: 32px;

    /* ── Border Radius ─────────────────────── */
    --radius-sm: 4px;
    --radius-md: 8px;
    --radius-lg: 12px;

    /* ── Shadow ────────────────────────────── */
    --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
    --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
  }

  /* ── Base Styles ───────────────────────── */
  *,
  *::before,
  *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: var(--font-sans);
    line-height: 1.5;
    color: var(--gray-700);
    background-color: var(--gray-100);
    -webkit-font-smoothing: antialiased;
    display: flex;
    min-height: 100vh;
  }

  h1, h2, h3, h4, h5, h6 {
    font-family: var(--font-display);
    color: var(--gray-900);
    line-height: 1.2;
  }

  a {
    color: var(--primary);
    text-decoration: none;
  }

  a:hover {
    text-decoration: underline;
  }

  img {
    max-width: 100%;
    height: auto;
  }

  /* ── Layout ────────────────────────────── */
  .sidebar {
    width: 250px;
    background-color: var(--gray-800);
    color: var(--gray-100);
    padding: var(--spacing-lg) var(--spacing-md);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    box-shadow: var(--shadow-lg);
    z-index: 1000;
  }

  .sidebar-logo {
    display: flex;
    align-items: center;
    gap: var(--spacing-sm);
    margin-bottom: var(--spacing-xl);
    padding: var(--spacing-sm);
    border-bottom: 1px solid var(--gray-700);
    padding-bottom: var(--spacing-md);
  }

  .logo-icon {
    font-size: 2rem;
  }

  .logo-text {
    font-family: var(--font-display);
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--white);
  }

  .logo-sub {
    font-size: 0.75rem;
    color: var(--gray-400);
  }

  .sidebar-nav {
    flex-grow: 1;
  }

  .nav-section-title {
    font-size: 0.85rem;
    color: var(--gray-400);
    margin-top: var(--spacing-md);
    margin-bottom: var(--spacing-sm);
    padding: 0 var(--spacing-sm);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: var(--spacing-sm);
    padding: var(--spacing-sm) var(--spacing-md);
    color: var(--gray-300);
    border-radius: var(--radius-md);
    margin-bottom: var(--spacing-xs);
    transition: all 0.2s ease;
  }

  .nav-item:hover {
    background-color: var(--gray-700);
    color: var(--white);
    text-decoration: none;
  }

  .nav-item.active {
    background-color: var(--primary);
    color: var(--white);
    font-weight: 600;
  }

  .nav-icon {
    font-size: 1.2rem;
    line-height: 1;
  }

  .sidebar-footer {
    font-size: 0.75rem;
    color: var(--gray-500);
    text-align: center;
    margin-top: var(--spacing-xl);
    padding-top: var(--spacing-md);
    border-top: 1px solid var(--gray-700);
  }

  .main-content {
    flex-grow: 1;
    padding: var(--spacing-lg);
    display: flex;
    flex-direction: column;
  }

  .top-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: var(--spacing-lg);
    padding-bottom: var(--spacing-md);
    border-bottom: 1px solid var(--gray-200);
  }

  .page-title {
    font-family: var(--font-display);
    font-size: 1.75rem;
    font-weight: 700;
    color: var(--gray-900);
    display: flex;
    align-items: center;
    gap: var(--spacing-sm);
  }

  .page-title span {
    color: var(--primary);
  }

  .header-spacer {
    flex-grow: 1;
  }

  .header-time {
    font-size: 1rem;
    color: var(--gray-600);
    margin-right: var(--spacing-md);
  }

  .header-badge {
    background-color: var(--primary-light);
    color: var(--primary);
    padding: 6px 12px;
    border-radius: var(--radius-md);
    font-weight: 600;
    font-size: 0.85rem;
  }

  .page-body {
    flex-grow: 1;
  }

  /* ── Forms & Buttons ───────────────────── */
  .form-group {
    margin-bottom: var(--spacing-md);
  }

  .form-label {
    display: block;
    font-size: 0.875rem;
    font-weight: 500;
    color: var(--gray-700);
    margin-bottom: var(--spacing-xs);
  }

  .form-control {
    display: block;
    width: 100%;
    padding: 8px 12px;
    font-size: 1rem;
    line-height: 1.5;
    color: var(--gray-700);
    background-color: var(--white);
    border: 1px solid var(--gray-300);
    border-radius: var(--radius-md);
    transition: border-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
  }

  .form-control:focus {
    border-color: var(--primary-hover);
    outline: 0;
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.25);
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 8px 16px;
    font-size: 1rem;
    font-weight: 600;
    line-height: 1.5;
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: all 0.15s ease-in-out;
    border: 1px solid transparent;
  }

  .btn-primary {
    color: var(--white);
    background-color: var(--primary);
    border-color: var(--primary);
  }

  .btn-primary:hover {
    background-color: var(--primary-hover);
    border-color: var(--primary-hover);
  }

  .btn-outline {
    color: var(--gray-700);
    background-color: var(--white);
    border-color: var(--gray-300);
  }

  .btn-outline:hover {
    color: var(--gray-900);
    border-color: var(--gray-400);
    background-color: var(--gray-100);
  }

  /* ── Cards ─────────────────────────────── */
  .card {
    background-color: var(--white);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-sm);
    margin-bottom: var(--spacing-md);
    overflow: hidden;
  }

  .card-header {
    display: flex;
    align-items: center;
    padding: var(--spacing-md);
    border-bottom: 1px solid var(--gray-200);
    background-color: var(--gray-50);
  }

  .card-title {
    font-family: var(--font-display);
    font-size: 1.125rem;
    font-weight: 600;
    color: var(--gray-800);
    display: flex;
    align-items: center;
    gap: var(--spacing-xs);
  }

  .card-body {
    padding: var(--spacing-md);
  }

  /* ── Badges ────────────────────────────── */
  .badge {
    display: inline-flex;
    align-items: center;
    padding: 4px 8px;
    border-radius: var(--radius-md);
    font-size: 0.75rem;
    font-weight: 600;
    line-height: 1;
  }

  .badge-primary {
    background-color: var(--primary-light);
    color: var(--primary);
  }

  .badge-info {
    background-color: var(--info-light);
    color: var(--info);
  }

  .badge-warning {
    background-color: var(--warning-light);
    color: var(--warning);
  }

  .badge-muted {
    background-color: var(--gray-200);
    color: var(--gray-600);
  }

  /* ── Grids ─────────────────────────────── */
  .filter-bar {
    display: flex;
    gap: var(--spacing-md);
    margin-bottom: var(--spacing-lg);
    flex-wrap: wrap;
    align-items: flex-end;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: var(--spacing-md);
    margin-bottom: var(--spacing-lg);
  }

  .stat-card {
    background-color: var(--white);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-sm);
    padding: var(--spacing-md);
    display: flex;
    align-items: center;
    gap: var(--spacing-md);
    border-left: 5px solid var(--stat-color, var(--primary));
  }

  .stat-icon {
    font-size: 2rem;
    line-height: 1;
  }

  .stat-info {
    flex-grow: 1;
  }

  .stat-value {
    font-family: var(--font-display);
    font-size: 1.75rem;
    font-weight: 700;
    color: var(--gray-900);
    line-height: 1;
  }

  .stat-label {
    font-size: 0.875rem;
    color: var(--gray-600);
    margin-top: 2px;
  }

  .stat-sub {
    font-size: 0.75rem;
    color: var(--gray-500);
  }

  .grid-cols-2-1 {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: var(--spacing-md);
  }

  @media (max-width: 1024px) {
    .grid-cols-2-1 {
      grid-template-columns: 1fr;
    }
  }

  /* ── Tables ────────────────────────────── */
  .table-wrapper {
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.9rem;
  }

  th,
  td {
    padding: 12px 16px;
    text-align: left;
    border-bottom: 1px solid var(--gray-200);
  }

  th {
    background-color: var(--gray-50);
    font-weight: 600;
    color: var(--gray-700);
    text-transform: uppercase;
    font-size: 0.8rem;
    letter-spacing: 0.05em;
  }

  tbody tr:hover {
    background-color: var(--gray-50);
  }

  .table-empty {
    text-align: center;
    color: var(--gray-500);
    padding: var(--spacing-xl) !important;
  }

  /* ── Utilities ─────────────────────────── */
  .mb-6 {
    margin-bottom: var(--spacing-lg);
  }

  .p-3 {
    padding: var(--spacing-md);
  }

  .flex-grow {
    flex-grow: 1;
  }

  .text-center {
    text-align: center;
  }

  .icon {
    font-size: 1.2em;
    line-height: 1;
  }

  /* ── Loading Overlay ───────────────────── */
  .loading-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(255, 255, 255, 0.8);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    transition: opacity 0.3s ease;
  }

  .spinner {
    border: 4px solid rgba(0, 0, 0, 0.1);
    border-left-color: var(--primary);
    border-radius: 50%;
    width: 40px;
    height: 40px;
    animation: spin 1s linear infinite;
    margin-bottom: var(--spacing-md);
  }

  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  .loading-text {
    color: var(--gray-700);
    font-size: 1.1rem;
    font-weight: 500;
  }

  /* ── SweetAlert2 Customization ─────────── */
  .swal-toast {
    font-family: var(--font-sans);
  }

  /* ── Responsive Adjustments ────────────── */
  @media (max-width: 768px) {
    .sidebar {
      width: 100%;
      height: auto;
      padding: var(--spacing-md);
      position: relative;
      box-shadow: var(--shadow-md);
    }

    body {
      flex-direction: column;
    }

    .main-content {
      padding: var(--spacing-md);
    }

    .top-header {
      flex-wrap: wrap;
      gap: var(--spacing-sm);
      justify-content: center;
      text-align: center;
    }

    .header-time {
      margin-right: 0;
      width: 100%;
    }

    .page-title {
      width: 100%;
      justify-content: center;
    }

    .filter-bar {
      flex-direction: column;
      align-items: stretch;
    }

    .form-group {
      margin-bottom: var(--spacing-sm);
    }

    .stats-grid {
      grid-template-columns: 1fr;
    }
  }
</style>
